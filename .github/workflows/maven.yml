name: Java CI with Maven

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    # We must specify the backend directory since the pom.xml is not in the root
    defaults:
      run:
        working-directory: ./backend

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven
        
    - name: Adjust permissions for Maven wrapper
      run: chmod +x mvnw
      
    - name: Build with Maven
      run: ./mvnw -B package --file pom.xml
